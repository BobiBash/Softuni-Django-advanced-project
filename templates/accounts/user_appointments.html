{% extends 'base.html' %}

{% block content %}
<div class="flex gap-8">
    {% for appointment in appointments %}
            <div class="flex flex-col border rounded-sm p-4">
                <p>Appointment with {{ appointment.vet.get_fullname }}</p>
                <p>For {{ appointment.pet.name }}</p>
                <p>On {{ appointment.slot.date }}</p>
                <p>At {{ appointment.slot.time|date:"H:i" }}</p>
            </div>
    {% endfor %}
</div>
{% endblock %}
