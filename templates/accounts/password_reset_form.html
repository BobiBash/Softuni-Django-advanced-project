{% extends 'base.html' %}
{% load static %}

{% block content %}
<form method="post" novalidate class="text-xl border rounded-sm w-sm flex flex-col items-center p-4">
    {% csrf_token %}
    <labe>{{ form.email.label }}</labe>
    <div class="[&_input]:border [&_input]:rounded [&_input]:px-1">{{ form.email }}</div>
    {{ form.email.errors }}
    <button type="submit">Send Reset Email</button>
</form>
{% endblock %}
