{% extends 'base.html' %}

{% block content %}
<form class="border bg-gray-200 rounded-sm pt-20 pb-10 px-10 flex flex-col items-center gap-4 w-145 h-80" method="post" action="{% url 'vet-schedule' slug=vet_slug %}">
  {% csrf_token %}
  <label class="bg-white relative self-start -ml-10 -mt-20 border-b border-r rounded-sm w-fit"><input type="text" name="date" id="date-input" placeholder="Pick a date"></label>
  <h1 class="text-2xl" id="header"></h1>
  <div class="grid grid-flow-col grid-rows-5 gap-x-4 gap-y-2" id="time-slots">
  </div>
  <button class="bg-blue-400 border rounded-sm py-1 px-2" type="submit">Save</button>
</form>
{% endblock %}

{% block scripts %}
<script>


  const savedSlots = {{ slots|safe }};

  const fp = flatpickr("#date-input", {
        minDate: 'today',
        maxDate: new Date().fp_incr(61),
        altInput: true,
        altFormat: "F j, Y",
        dateFormat: "Y-m-d",
        onChange: function(selectedDates, dateStr) {
          const alreadySavedTimes = savedSlots
              .filter(s => s.date == dateStr)
              .map(s => s.time.slice(0, 5))

            header.textContent = 'Schedule for ' + fp.altInput.value
            console.log(alreadySavedTimes)

            document.querySelectorAll('input[name="time"]')
                .forEach(checkbox => {
                    if (alreadySavedTimes.includes(checkbox.value))
                        checkbox.checked = true
                    console.log(checkbox)
                })
  }});

  const ALL_SLOTS = ['07:00', '07:30', '08:00', '08:30',  '09:00', '09:30',  '10:00',  '10:30',
      '11:00', '11:30',  '12:00', '12:30',  '13:00', '13:30',  '14:00', '14:30',  '15:00', '15:30',
      '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:00', '20:30', '21:00', '21:30',]
  const slotsDiv = document.getElementById('time-slots')
  const header = document.getElementById('header')
  const ChosenDate = document.getElementById('date-input')

  console.log(ChosenDate.value)


  ALL_SLOTS.forEach((timestamp) => {
    slotsDiv.innerHTML += `<label class="text-xl"><input type='checkbox' name='time' value='${timestamp}'/>${timestamp}</label>`
  })


</script>
{% endblock %}
